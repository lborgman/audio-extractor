<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Extractor</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base
         Background: #0f0f0f  Body text: #d4d4d4 (11.4:1)
         All label/secondary text: #999 (5.4:1) — passes WCAG AA            */
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      line-height: 1.5;
      background: #0f0f0f;
      color: #d4d4d4;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container { width: 100%; max-width: 720px; }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2.5rem;
    }
    header img { display: block; border-radius: 8px; }
    header h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #999; /* 5.4:1 on #0f0f0f — passes AA */
    }
    header .credit {
      font-size: 12px;
      color: #555;
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    /* ── Sections ────────────────────────────────────────────────────────────── */
    .section { margin-bottom: 2rem; }
    .divider { border: none; border-top: 1px solid #2a2a2a; margin: 2rem 0; }

    /* ── Labels (above fields) — 13px bold gives AA at 3:1 for large/bold text */
    .label {
      font-size: 13px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #999; /* 5.4:1 */
      margin-bottom: 8px;
    }

    /* ── Drop zone ────────────────────────────────────────────────────────────── */
    .drop-zone {
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 2.5rem;
      text-align: center;
      color: #999;
      font-size: 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .drop-zone:hover,
    .drop-zone.drag-over { border-color: #666; color: #d4d4d4; background: #1a1a1a; }
    .drop-zone:focus-visible { outline: 2px solid #8ab4f8; outline-offset: 2px; }
    .drop-zone .dz-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
    .drop-zone input[type="file"] { display: none; }
    .drop-zone.loaded { color: #d4d4d4; border-color: #4a4a4a; }
    .dz-filename {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
    .dz-duration {
      display: block;
      font-size: 13px;
      color: #999;
      margin-top: 2px;
    }
    .drop-zone.loading { border-color: #8ab4f8; color: #8ab4f8; cursor: default; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 2px solid #2a2a2a;
      border-top-color: #8ab4f8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 8px;
    }

    /* ── Canvas ────────────────────────────────────────────────────────────────── */
    canvas#waveform {
      width: 100%;
      height: 100px;
      display: block;
      border-radius: 6px;
      background: #1a1a1a;
      cursor: default;
      touch-action: none;
    }
    canvas#waveform:focus-visible { outline: 2px solid #8ab4f8; }

    /* ── Zoom / pan sliders ───────────────────────────────────────────────────── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
    }
    .slider-row-label {
      font-size: 14px;
      color: #999;
      white-space: nowrap;
      width: 40px;
    }
    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 3px;
      background: #3a3a3a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]:focus-visible { outline: 2px solid #8ab4f8; outline-offset: 3px; border-radius: 2px; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: #d4d4d4;
      border-radius: 50%;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px;
      background: #d4d4d4;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }
    #pan-row { display: flex; }
    #pan-row.inert-pan { opacity: 0.5; pointer-events: none; }

    /* ── Info bar ──────────────────────────────────────────────────────────────── */
    .info-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      margin-top: 8px;
      font-size: 14px;
      color: #999;
    }

    /* ── Time inputs ────────────────────────────────────────────────────────────── */
    .time-row { display: flex; gap: 1rem; }
    .time-field { flex: 1; }
    .time-field label {
      font-size: 14px;
      color: #999;
      display: block;
      margin-bottom: 6px;
    }
    .time-field input[type="number"] {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .time-field input[type="number"]:focus { border-color: #8ab4f8; }
    .time-field input[type="number"]:focus-visible { outline: 2px solid #8ab4f8; outline-offset: 0; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 0.5; }

    /* ── Format select ─────────────────────────────────────────────────────────── */
    .fmt-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .fmt-row label { font-size: 14px; color: #999; }
    .fmt-row select {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      background: #1a1a1a;
      color: #d4d4d4;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 8px 12px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .fmt-row select:focus { border-color: #8ab4f8; }
    .fmt-row select:focus-visible { outline: 2px solid #8ab4f8; }
    #bitrate-label,
    #bitrate-select { display: none; }
    #est-size {
      font-size: 14px;
      color: #999;
      white-space: nowrap;
    }
    #input-fmt {
      font-size: 15px;
      color: #d4d4d4;
    }
    .time-unit-note {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
    #length-display { color: #999; cursor: default; }
      font-size: 13px;
      color: #86efac;
      white-space: nowrap;
      letter-spacing: 0.03em;
    }

    /* ── Fade row ──────────────────────────────────────────────────────────────── */
    .fade-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .fade-row label { font-size: 14px; color: #999; white-space: nowrap; }
    .fade-row input[type="number"] {
      width: 80px;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #d4d4d4;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }
    .fade-row input[type="number"]:focus { border-color: #8ab4f8; }

    #editor-section {
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }
    .time-unit-note { font-size: 13px; color: #666; margin-top: 6px; }
    #length-display { font-size: 16px; color: #999; display: block; padding: 9px 0; }

    /* ── Action buttons ────────────────────────────────────────────────────────── */
    .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; align-items: center; flex-wrap: wrap; }
    button {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 6px;
      padding: 9px 18px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    button:focus-visible { outline: 2px solid #8ab4f8; outline-offset: 2px; }

    #play-btn {
      background: transparent;
      border: 1px solid #3a3a3a;
      color: #d4d4d4; /* 11.4:1 */
    }
    #play-btn:hover { border-color: #666; background: #1a1a1a; }

    #extract-btn {
      background: #d4d4d4;
      border: 1px solid #d4d4d4;
      color: #0f0f0f; /* 11.4:1 on #d4d4d4 */
      font-weight: bold;
    }
    #extract-btn:hover:not(:disabled) { background: #ffffff; border-color: #ffffff; }
    #extract-btn:disabled { background: #2a2a2a; border-color: #2a2a2a; color: #666; cursor: not-allowed; }

    /* ── Status ────────────────────────────────────────────────────────────────── */
    .status {
      font-size: 15px;
      color: #999;
      margin-top: 0.5rem;
      margin-bottom: 1rem;
    }
    /* Error: #ff8a80 = 6.5:1 on #0f0f0f  ✓ */
    .status.error { color: #ff8a80; }
    /* OK: #86efac = 8.5:1 on #0f0f0f  ✓ */
    .status.ok    { color: #86efac; }

    /* ── Download link ─────────────────────────────────────────────────────────── */
    #download-link {
      display: none;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.05em;
      cursor: pointer;
      border-radius: 6px;
      padding: 9px 18px;
      line-height: 1.6;
      text-decoration: none;
      background: #d4d4d4;
      border: 1px solid #d4d4d4;
      color: #0f0f0f;
      font-weight: bold;
      transition: background 0.15s, border-color 0.15s;
    }
    #download-link:hover  { background: #ffffff; border-color: #ffffff; }
    #download-link.active { display: inline-block; }
    #download-link[disabled], #download-link.disabled {
      background: #2a2a2a; border-color: #2a2a2a; color: #555; cursor: not-allowed;
    }
    #download-link:focus-visible { outline: 2px solid #8ab4f8; outline-offset: 2px; }
    #dl-filename {
      display: block;
      font-size: 13px;
      font-weight: normal;
      color: #444;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 100%;
    }
  </style>
  <link rel="stylesheet" href="audio-extractor.css">
</head>
<body>
<div class="container">

  <!-- ── Header ── -->
  <header>
    <img src="favicon.svg" width="44" height="44" alt="Audio Extractor logo">
    <div>
      <h1>Audio Extractor</h1>
      <div class="credit">(made by Claude AI)</div>
    </div>
  </header>

  <!-- ── File drop ── -->
  <!-- File input lives outside drop zone so replacing dropZone.innerHTML never detaches it -->
  <input type="file" id="file-input" accept="audio/*,video/*" style="display:none">
  <div class="section">
    <div class="drop-zone" id="drop-zone" tabindex="0" role="button"
         aria-label="Upload audio or video file. Click or drop a file here.">
      <span class="dz-icon" aria-hidden="true">♪</span>
      <strong class="label" style="display:block;margin-bottom:4px">Source file</strong>
      Drop an audio or video file here, or click to browse
    </div>
  </div>

  <div id="load-status" class="status" role="status" aria-live="polite"></div>

  <!-- ── Editor (hidden until file loaded) ── -->
  <div id="editor-section" style="display:none">
    <hr class="divider">

    <!-- Waveform -->
    <div class="section">
      <div class="label">Waveform</div>
      <canvas id="waveform" width="680" height="100"
              tabindex="0" role="img" aria-label="Audio waveform"></canvas>

      <div class="slider-row">
        <label class="slider-row-label" for="zoom-slider">Zoom</label>
        <input type="range" id="zoom-slider" min="1" max="32" step="1" value="1">
      </div>

      <div class="slider-row" id="pan-row">
        <label class="slider-row-label" for="pan-slider">Pan</label>
        <input type="range" id="pan-slider" min="0" max="1" step="0.001" value="0">
      </div>

      <div class="info-bar" aria-live="polite">
        <span id="dur-label">Duration: —</span>
        <span id="sel-label">Selected: —</span>
      </div>
    </div>

    <!-- Region -->
    <div class="section">
      <div class="label">Region</div>
      <div class="status" id="status" role="status" aria-live="polite"></div>
      <div class="time-row">
        <div class="time-field">
          <label>Start
            <input type="number" id="start-input" min="0" step="0.01" value="0">
          </label>
        </div>
        <div class="time-field">
          <label>End
            <input type="number" id="end-input" min="0" step="0.01" value="0">
          </label>
        </div>
        <div class="time-field">
          <label>Max
            <input type="number" id="max-input" min="0" step="1" value="10">
          </label>
        </div>
        <div class="time-field">
          <label>Length</label>
          <span id="length-display"></span>
        </div>
      </div>
      <div class="time-unit-note">All values in seconds</div>
    </div>

    <!-- Format -->
    <div class="section">
      <div class="label">Audio format</div>
      <div class="fmt-row">
        <label>Input</label>
        <span id="input-fmt">—</span>
      </div>
      <div class="fmt-row" style="margin-top:6px">
        <label>Output
          <select id="fmt-select">
            <option value="aac">AAC</option>
            <option value="wav">WAV</option>
          </select>
        </label>
        <label id="bitrate-label">Bitrate
          <select id="bitrate-select">
            <option value="96000">96 kbps</option>
            <option value="128000" selected>128 kbps</option>
            <option value="160000">160 kbps</option>
            <option value="192000">192 kbps</option>
          </select>
        </label>
        <span id="lossless-badge" style="display:none"></span>
        <span id="est-size"></span>
      </div>
    </div>

    <!-- Fade -->
    <div class="section">
      <div class="label">Fade</div>
      <div class="fade-row">
        <label>Fade in (s)
          <input type="number" id="fade-in"  min="0" step="0.1" value="0">
        </label>
        <label>Fade out (s)
          <input type="number" id="fade-out" min="0" step="0.1" value="0">
        </label>
      </div>
    </div>

    <!-- Actions -->
    <div class="btn-row">
      <button id="play-btn" type="button">▶ Preview</button>
      <a id="download-link" role="button" tabindex="0">
        ✂ Extract to file:<br>
        <span id="dl-filename"></span>
      </a>
    </div>
  </div>

</div><!-- /.container -->

<script>
(function () {
  'use strict';

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const dropZone      = document.getElementById('drop-zone');
  const fileInput     = document.getElementById('file-input');
  const editorSection = document.getElementById('editor-section');
  const canvas        = document.getElementById('waveform');
  const ctx2d         = canvas.getContext('2d');
  const startInput    = document.getElementById('start-input');
  const endInput      = document.getElementById('end-input');
  const maxInput      = document.getElementById('max-input');
  const lengthDisplay = document.getElementById('length-display');
  const fmtSelect     = document.getElementById('fmt-select');
  const bitrateSelect = document.getElementById('bitrate-select');
  const bitrateLabel  = document.getElementById('bitrate-label');
  const estSizeEl     = document.getElementById('est-size');
  const losslessBadge = document.getElementById('lossless-badge');
  const inputFmtEl    = document.getElementById('input-fmt');
  const playBtn       = document.getElementById('play-btn');
  const downloadLink  = document.getElementById('download-link');
  const dlFilename    = document.getElementById('dl-filename');
  const fadeInEl      = document.getElementById('fade-in');
  const fadeOutEl     = document.getElementById('fade-out');
  const statusEl      = document.getElementById('status');
  const loadStatusEl  = document.getElementById('load-status');
  const durLabel      = document.getElementById('dur-label');
  const selLabel      = document.getElementById('sel-label');
  const zoomSlider    = document.getElementById('zoom-slider');
  const panSlider     = document.getElementById('pan-slider');
  const panRow        = document.getElementById('pan-row');

  // ── URL parameter ─────────────────────────────────────────────────────────────
  let maxSec = Math.max(0, parseFloat(new URLSearchParams(location.search).get('seconds')) || 10);

  // ── State ───────────────────────────────────────────────────────────────────
  let audioCtx    = null;
  let audioBuffer = null;
  let sourceFile   = null;  // original File object, kept for remuxing
  let sourceFormat = null;  // detected container format: 'wav','adts','mp4','flac',null
  let selStart    = 0;
  let selEnd      = 0;
  let previewSrc  = null;
  let zoomLevel   = 1;
  let viewStart   = 0;   // seconds

  // Offscreen canvas caches the waveform bars so drawWaveform() during
  // marker drag is just drawImage + a few primitives — no per-sample loop.
  const offscreen    = document.createElement('canvas');
  const offCtx       = offscreen.getContext('2d');
  let   waveformDirty = true; // set true whenever cache needs rebuilding

  // Marker dragging: null | 'S' | 'E'
  let draggingMarker = null;

  // Pinch
  let pinching   = false;
  let pinchDist0 = 0;
  let pinchZoom0 = 1;
  let pinchVS0   = 0;
  let pinchMidR  = 0.5;



  // ── AudioContext (lazy, avoids autoplay policy warnings) ────────────────────
  function getAC() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // ── Status helper ────────────────────────────────────────────────────────────
  function setStatus(msg, cls) {
    statusEl.textContent = msg;
    statusEl.className   = 'status' + (cls ? ' ' + cls : '');
  }

  // ── Zoom helpers ─────────────────────────────────────────────────────────────
  function visDur() {
    return audioBuffer ? audioBuffer.duration / zoomLevel : 0;
  }

  function clampVS(vs, zoom) {
    const vd = audioBuffer.duration / zoom;
    return Math.max(0, Math.min(audioBuffer.duration - vd, vs));
  }

  function applyZoom(newZoom, newVS) {
    zoomLevel = Math.max(1, Math.min(32, newZoom));
    viewStart = clampVS(newVS !== undefined ? newVS : viewStart, zoomLevel);
    zoomSlider.value = Math.round(zoomLevel);
    const zoomed = zoomLevel > 1.001;
    panRow.classList.toggle('inert-pan', !zoomed);
    if (zoomed) {
      const maxVS = audioBuffer.duration - visDur();
      panSlider.value = maxVS > 0 ? (viewStart / maxVS).toFixed(4) : 0;
    }
    waveformDirty = true;
    drawWaveform();
  }

  zoomSlider.addEventListener('input', () => {
    const newZoom = parseInt(zoomSlider.value, 10);
    const centre  = viewStart + visDur() / 2;
    applyZoom(newZoom, centre - (audioBuffer.duration / newZoom) / 2);
  });

  panSlider.addEventListener('input', () => {
    if (!audioBuffer) return;
    viewStart = parseFloat(panSlider.value) * (audioBuffer.duration - visDur());
    waveformDirty = true;
    drawWaveform();
  });

  // ── Waveform cache ────────────────────────────────────────────────────────────
  // Renders waveform bars into offscreen canvas once per zoom/pan/file change.
  // drawWaveform() then just blits the cache + overlays markers — no sample loop.
  function buildWaveformCache() {
    if (!audioBuffer) return;
    const W  = canvas.width;
    const H  = canvas.height;
    offscreen.width  = W;
    offscreen.height = H;

    const sr   = audioBuffer.sampleRate;
    const data = audioBuffer.getChannelData(0);
    const vd   = visDur();
    const ve   = viewStart + vd;

    const sStart = Math.max(0, Math.floor(viewStart * sr));
    const sEnd   = Math.min(data.length, Math.ceil(ve * sr));
    const step   = Math.max(1, Math.ceil((sEnd - sStart) / W));

    offCtx.clearRect(0, 0, W, H);
    offCtx.fillStyle = '#444';
    for (let x = 0; x < W; x++) {
      let mn = 1, mx = -1;
      const off = sStart + x * step;
      for (let j = 0; j < step; j++) {
        const v = data[off + j] || 0;
        if (v < mn) mn = v;
        if (v > mx) mx = v;
      }
      const yTop = H / 2 - mx * (H / 2) * 0.9;
      offCtx.fillRect(x, yTop, 1, Math.max(1, (H / 2 - mn * (H / 2) * 0.9) - yTop));
    }
    waveformDirty = false;
  }

  // ── Fast draw (blit cache + highlight + markers) ──────────────────────────────
  function drawWaveform() {
    if (!audioBuffer) return;
    if (waveformDirty) buildWaveformCache();

    const W  = canvas.width;
    const H  = canvas.height;
    const vd = visDur();
    const toX = t => ((t - viewStart) / vd) * W;
    const x0  = Math.round(toX(selStart));
    const x1  = Math.round(toX(selEnd));
    const cx0 = Math.max(0, x0);
    const cx1 = Math.min(W, x1);

    ctx2d.clearRect(0, 0, W, H);

    // 1. Blit cached bars (the expensive part, done once)
    ctx2d.drawImage(offscreen, 0, 0);

    // 2. Lighten bars inside the selection
    ctx2d.save();
    ctx2d.globalCompositeOperation = 'source-atop';
    ctx2d.fillStyle = 'rgba(255,255,255,0.5)';
    ctx2d.fillRect(cx0, 0, cx1 - cx0, H);
    ctx2d.restore();

    // 3. Subtle background tint for selected region
    ctx2d.save();
    ctx2d.globalCompositeOperation = 'destination-over';
    ctx2d.fillStyle = 'rgba(255,255,255,0.05)';
    ctx2d.fillRect(cx0, 0, cx1 - cx0, H);
    ctx2d.restore();

    // 4. Markers
    function drawMarker(label, xc, color) {
      const TW = 13, TH = 20;
      const xd = Math.max(TW, Math.min(W - TW, xc));
      ctx2d.fillStyle = color;
      ctx2d.fillRect(xd - 1, 0, 2, H);
      ctx2d.beginPath();
      ctx2d.moveTo(xd - TW, 0);
      ctx2d.lineTo(xd + TW, 0);
      ctx2d.lineTo(xd,       TH);
      ctx2d.closePath();
      ctx2d.fill();
      ctx2d.fillStyle    = '#0f0f0f';
      ctx2d.font         = 'bold 11px monospace';
      ctx2d.textAlign    = 'center';
      ctx2d.textBaseline = 'top';
      ctx2d.fillText(label, xd, 3);
    }
    drawMarker('S', x0, '#4ade80');
    drawMarker('E', x1, '#f87171');

    // 5. Info bar — skip DOM writes while dragging to avoid layout work
    if (!draggingMarker) {
      durLabel.textContent = 'Duration: ' + audioBuffer.duration.toFixed(2) + 's';
      selLabel.textContent = 'Selected: '  + selStart.toFixed(2) + 's – ' + selEnd.toFixed(2) +
                             's  (' + (selEnd - selStart).toFixed(2) + 's)';
    }
  }

  // ── Coordinate helpers ────────────────────────────────────────────────────────
  function pxToTime(clientX) {
    const rect = canvas.getBoundingClientRect();
    return Math.max(0, Math.min(audioBuffer.duration,
      viewStart + ((clientX - rect.left) / rect.width) * visDur()));
  }

  // Canvas-pixel x for a time value (using current bounding rect)
  function timeToCssPx(t) {
    const rect = canvas.getBoundingClientRect();
    return ((t - viewStart) / visDur()) * rect.width;
  }

  // Visual (clamped) CSS-pixel position of a marker — matches where drawMarker
  // actually renders the triangle handle (which is clamped to stay inside canvas).
  function markerVisualCssPx(t) {
    const rect   = canvas.getBoundingClientRect();
    const scale  = rect.width / canvas.width; // CSS px per canvas px
    const TW_css = 13 * scale;                // triangle half-width in CSS px
    const raw    = timeToCssPx(t);
    return Math.max(TW_css, Math.min(rect.width - TW_css, raw));
  }

  // Which marker is closest to clientX and within HIT_PX?
  // Returns 'S', 'E', or null.
  const HIT_PX = 28; // generous touch target
  function hitMarker(clientX) {
    const rect  = canvas.getBoundingClientRect();
    const px    = clientX - rect.left;
    const distS = Math.abs(px - markerVisualCssPx(selStart));
    const distE = Math.abs(px - markerVisualCssPx(selEnd));
    if (Math.min(distS, distE) > HIT_PX) return null;
    // When overlapping, prefer E so it can always be dragged rightward
    return distE <= distS ? 'E' : 'S';
  }

  // ── Marker drag helpers ───────────────────────────────────────────────────────
  function startMarkerDrag(clientX) {
    if (!audioBuffer) return;
    const hit = hitMarker(clientX);
    if (hit) {
      draggingMarker = hit;
    } else {
      // Tap on empty area: snap nearest marker to that position
      const t     = pxToTime(clientX);
      const rect  = canvas.getBoundingClientRect();
      const px    = clientX - rect.left;
      const nearS = Math.abs(px - markerVisualCssPx(selStart));
      const nearE = Math.abs(px - markerVisualCssPx(selEnd));
      if (nearS <= nearE) {
        selStart = Math.min(t, selEnd);
        draggingMarker = 'S';
      } else {
        selEnd = Math.max(t, selStart);
        draggingMarker = 'E';
      }
      updateInputs();
      drawWaveform();
    }
    canvas.style.cursor = 'ew-resize';
  }

  function moveMarkerDrag(clientX) {
    if (!draggingMarker || !audioBuffer) return;
    const dur = audioBuffer.duration;
    const t   = pxToTime(clientX);
    if (draggingMarker === 'S') {
      selStart = Math.min(t, selEnd);
      if (maxSec > 0 && selEnd - selStart > maxSec)
        selEnd = Math.min(dur, selStart + maxSec);
    } else {
      selEnd = Math.max(t, selStart);
      if (maxSec > 0 && selEnd - selStart > maxSec)
        selStart = Math.max(0, selEnd - maxSec);
    }
    updateInputs();
    drawWaveform();
  }

  function endMarkerDrag() {
    if (!draggingMarker) return;
    draggingMarker = null;
    canvas.style.cursor = 'default';
    // Now that dragging is done, flush updates to inputs and info bar
    updateInputs();
    durLabel.textContent = 'Duration: ' + audioBuffer.duration.toFixed(2) + 's';
    selLabel.textContent = 'Selected: '  + selStart.toFixed(2) + 's – ' + selEnd.toFixed(2) +
                           's  (' + (selEnd - selStart).toFixed(2) + 's)';
    updateExtractBtn();
  }

  // ── Mouse events ──────────────────────────────────────────────────────────────
  canvas.addEventListener('mousedown', e => {
    if (!audioBuffer) return;
    e.preventDefault();
    startMarkerDrag(e.clientX);
  });
  canvas.addEventListener('mousemove', e => {
    if (draggingMarker) {
      moveMarkerDrag(e.clientX);
    } else if (audioBuffer) {
      canvas.style.cursor = hitMarker(e.clientX) ? 'ew-resize' : 'default';
    }
  });
  window.addEventListener('mouseup', () => endMarkerDrag());

  // ── Touch events ──────────────────────────────────────────────────────────────
  canvas.addEventListener('touchstart', e => {
    if (!audioBuffer) return;
    e.preventDefault();
    if (e.touches.length === 1) {
      pinching = false;
      startMarkerDrag(e.touches[0].clientX);
    } else if (e.touches.length === 2) {
      endMarkerDrag();
      pinching   = true;
      pinchDist0 = Math.abs(e.touches[1].clientX - e.touches[0].clientX);
      pinchZoom0 = zoomLevel;
      pinchVS0   = viewStart;
      const rect = canvas.getBoundingClientRect();
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchMidR  = (midX - rect.left) / rect.width;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && draggingMarker) {
      moveMarkerDrag(e.touches[0].clientX);
    } else if (e.touches.length === 2 && pinching) {
      const dist   = Math.abs(e.touches[1].clientX - e.touches[0].clientX);
      const scale  = pinchDist0 > 0 ? dist / pinchDist0 : 1;
      const newZ   = Math.max(1, Math.min(32, pinchZoom0 * scale));
      const anchor = pinchVS0 + pinchMidR * (audioBuffer.duration / pinchZoom0);
      applyZoom(newZ, anchor - pinchMidR * (audioBuffer.duration / newZ));
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.touches.length === 0) {
      endMarkerDrag();
      pinching = false;
    }
    if (e.touches.length === 1 && pinching) {
      // Lifted one finger during pinch — stop pinch, don't move markers
      pinching = false;
      endMarkerDrag();
    }
  }, { passive: false });

  // ── File loading ──────────────────────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function handleFile(file) {
    sourceFile   = file;
    sourceFormat = null;
    inputFmtEl.textContent = '—';
    updateLosslessBadge();

    setStatus('Reading file…');
    downloadLink.classList.remove('active', 'disabled');
    downloadLink.removeAttribute('href');
    downloadLink.removeAttribute('download');
    dlFilename.textContent = '';
    markExtractDirty();
    dropZone.classList.remove('loaded');
    dropZone.classList.add('loading');
    dropZone.innerHTML = '<div class="spinner" aria-hidden="true"></div>' +
      '<span class="dz-filename">' + escapeHtml(file.name) + '</span>';

    const reader = new FileReader();
    reader.onload = async evt => {
      let fmtLabel = file.name.split('.').pop().toUpperCase() || 'unknown';
      try {
        // Detect format first so it's available if decoding fails
        const header = evt.target.result.slice(0, 16);
        const u8     = new Uint8Array(header);
        const view   = new DataView(header);
        sourceFormat = detectContainerFormat(view, u8);
        const labels = {
          wav: 'WAV', adts: 'AAC', mp4: 'MP4 / M4A / MOV',
          flac: 'FLAC', webm: 'WebM', ogg: 'OGG', avi: 'AVI'
        };
        fmtLabel = labels[sourceFormat] || fmtLabel;

        // For WAV, read the subformat from the fmt chunk for a more helpful message
        if (sourceFormat === 'wav') {
          try {
            const full = new DataView(evt.target.result);
            const fu8  = new Uint8Array(evt.target.result);
            let p = 12;
            while (p < fu8.length - 8) {
              const tag = String.fromCharCode(fu8[p],fu8[p+1],fu8[p+2],fu8[p+3]);
              const sz  = full.getUint32(p + 4, true);
              if (tag === 'fmt ') {
                const audioFmt = full.getUint16(p + 8, true);
                const bps      = full.getUint16(p + 22, true);
                const fmtNames = { 1: 'PCM', 3: 'IEEE float', 6: 'A-law', 7: 'μ-law', 0xFFFE: 'Extensible' };
                const fmtName  = fmtNames[audioFmt] || ('format 0x' + audioFmt.toString(16));
                fmtLabel = 'WAV (' + fmtName + ' ' + bps + '-bit)';
                break;
              }
              if (sz === 0) break;
              p += 8 + sz + (sz & 1);
            }
          } catch (_) {}
        }

        // For MP4, use the file extension and ftyp major brand
        if (sourceFormat === 'mp4') {
          try {
            const ext   = file.name.split('.').pop().toUpperCase();
            const full  = new DataView(evt.target.result);
            const fu8   = new Uint8Array(evt.target.result);
            const brand = String.fromCharCode(fu8[8],fu8[9],fu8[10],fu8[11]).trim();
            const brandLabels = { 'M4A ': 'M4A (AAC audio)', 'M4V ': 'M4V', 'mp41': 'MP4', 'mp42': 'MP4',
                                  'isom': 'MP4', 'iso2': 'MP4', 'avc1': 'MP4', 'qt  ': 'MOV (QuickTime)' };
            fmtLabel = (brandLabels[brand] || ext) + ' container';
          } catch (_) {}
        }
        inputFmtEl.textContent = fmtLabel;
        updateLosslessBadge();

        loadStatusEl.textContent = 'Decoding audio…';
        loadStatusEl.className   = 'status';
        audioBuffer = await getAC().decodeAudioData(evt.target.result);
        await finishLoad(file);
      } catch (err) {
        showLoadError('Could not decode ' + fmtLabel + ': ' + err.message);
      }
    };
    reader.onerror = () => showLoadError('Could not read file.');
    reader.readAsArrayBuffer(file);
  }

  function showLoadError(msg) {
    audioBuffer = null;
    editorSection.style.display = 'none';
    dropZone.classList.remove('loading');
    dropZone.innerHTML = '<span class="dz-icon" aria-hidden="true">♪</span>' +
      'Drop an audio or video file here, or click to browse';
    loadStatusEl.textContent = msg;
    loadStatusEl.className   = 'status error';
  }

  async function finishLoad(file) {
    loadStatusEl.textContent = 'Building waveform…';
    await new Promise(r => setTimeout(r, 0));
    waveformDirty = true;
    buildWaveformCache();
    selStart = 0;
    selEnd   = Math.min(audioBuffer.duration, maxSec);
    editorSection.style.display = 'flex';
    loadStatusEl.textContent = '';
    dropZone.classList.remove('loading');
    dropZone.classList.add('loaded');
    dropZone.innerHTML = '<span class="dz-icon" aria-hidden="true">✓</span>'
      + '<strong class="label" style="display:block;margin-bottom:2px">Source file</strong>'
      + '<span class="dz-filename">' + escapeHtml(file.name) + '</span>'
      + '<span class="dz-duration">' + audioBuffer.duration.toFixed(2) + ' s</span>';
    applyZoom(1, 0);
    updateInputs();
    setStatus('Drag the markers on the waveform, or type times below');
    if (typeof AudioEncoder !== 'undefined') checkBitrateSupport();
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Time inputs ───────────────────────────────────────────────────────────────
  function updateInputs() {
    startInput.value    = selStart.toFixed(2);
    endInput.value      = selEnd.toFixed(2);
    lengthDisplay.textContent = (selEnd - selStart).toFixed(2);
    updateExtractBtn();
    updateEstSize();
    markExtractDirty();
  }

  function updateExtractBtn() {
    const ready = audioBuffer && selEnd > selStart;
    downloadLink.classList.toggle('active',   !!audioBuffer);
    downloadLink.classList.toggle('disabled', !ready);
    if (!ready) dlFilename.textContent = '';
    else updateDownloadFilename();
  }

  // Pre-computes and shows the output filename so the button is always one click.
  // Clears the href so the next click re-encodes (not re-downloads old blob).
  function updateDownloadFilename() {
    if (!audioBuffer || selEnd <= selStart) return;
    const baseName = sourceFile ? sourceFile.name.replace(/\.[^.]+$/, '') : 'audio';
    const ts       = selStart.toFixed(2) + '-' + selEnd.toFixed(2);
    const ext      = fmtSelect.value === 'aac' ? 'aac' : 'wav';
    dlFilename.textContent = baseName + '_' + ts + '.' + ext;
    // Clear stale href so next click always re-encodes
    downloadLink.removeAttribute('href');
    downloadLink.removeAttribute('download');
    downloadLink.dataset.dirty = '1';
  }

  startInput.addEventListener('input', syncTimeInputs);
  endInput.addEventListener('input',   syncTimeInputs);

  maxInput.value = maxSec;
  maxInput.addEventListener('input', () => {
    maxSec = Math.max(0, parseFloat(maxInput.value) || 0);
    if (audioBuffer && maxSec > 0 && selEnd - selStart > maxSec) {
      selEnd = Math.min(audioBuffer.duration, selStart + maxSec);
      updateInputs();
      drawWaveform();
    }
  });
  maxInput.value = maxSec;
  maxInput.addEventListener('input', () => {
    maxSec = Math.max(0, parseFloat(maxInput.value) || 0);
    // Re-enforce the new limit on the current selection
    if (audioBuffer && maxSec > 0 && selEnd - selStart > maxSec) {
      selEnd = Math.min(audioBuffer.duration, selStart + maxSec);
      updateInputs();
      drawWaveform();
    }
  });
  function syncTimeInputs() {
    if (!audioBuffer) return;
    const dur = audioBuffer.duration;
    selStart = Math.max(0, Math.min(dur, parseFloat(startInput.value) || 0));
    selEnd   = Math.max(selStart, Math.min(dur, parseFloat(endInput.value) || 0));
    // Enforce max length: if end was typed, push start back; otherwise push end forward
    if (maxSec > 0 && selEnd - selStart > maxSec) {
      if (document.activeElement === endInput) {
        selStart = Math.max(0, selEnd - maxSec);
      } else {
        selEnd = Math.min(dur, selStart + maxSec);
      }
    }
    drawWaveform();
    updateExtractBtn();
    updateEstSize();
    markExtractDirty();
  }

  // Show/hide the "✓ lossless copy" badge on the format line.
  // Visible only when the selected output format matches the source format
  // (meaning remux will be used instead of decode→reencode).
  function updateLosslessBadge() {
    const fmt    = fmtSelect.value;
    const canRemux =
      (fmt === 'wav' && sourceFormat === 'wav') ||
      (fmt === 'aac' && (sourceFormat === 'adts' || sourceFormat === 'mp4')) ||
      (sourceFormat === 'flac');
    losslessBadge.textContent    = canRemux ? '✓ lossless copy' : '';
    losslessBadge.style.display  = canRemux ? 'inline' : 'none';
  }

  // Show bitrate selector only for AAC
  function updateFmtUI() {
    const isAAC = fmtSelect.value === 'aac';
    bitrateLabel.style.display  = isAAC ? 'inline' : 'none';
    bitrateSelect.style.display = isAAC ? 'inline' : 'none';
    updateLosslessBadge();
    updateEstSize();
  }
  fmtSelect.addEventListener('change', () => { updateFmtUI(); markExtractDirty(); });
  bitrateSelect.addEventListener('change', () => { updateEstSize(); markExtractDirty(); });
  updateFmtUI(); // set initial state

  // ── Estimated output file size ────────────────────────────────────────────────
  // AAC:  bitrate (bits/s) × duration (s) / 8  → bytes  (+7-byte ADTS header per
  //       frame is negligible, ~0.7% overhead at 128 kbps / 44.1 kHz)
  // WAV:  sampleRate × channels × 2 bytes × duration
  function updateEstSize() {
    if (!audioBuffer || selEnd <= selStart) { estSizeEl.textContent = ''; return; }
    const dur = selEnd - selStart;
    let bytes;
    if (fmtSelect.value === 'aac') {
      const bitrate = parseInt(bitrateSelect.value, 10);
      bytes = (bitrate / 8) * dur;
    } else {
      bytes = audioBuffer.sampleRate * audioBuffer.numberOfChannels * 2 * dur;
    }
    const mb = bytes / 1_000_000; // decimal MB (not MiB)
    // 2 significant figures
    const formatted = mb < 0.01  ? '< 0.01 MB'
                    : mb < 10    ? mb.toPrecision(2) + ' MB'
                    :              mb.toPrecision(2) + ' MB';
    estSizeEl.textContent = '≈ ' + formatted;
  }

  // ── Check which AAC bitrates are supported on this device ────────────────────
  // Runs after file load (so we know sampleRate + numberOfChannels).
  // Disables options the browser/device rejects, adds "(unsupported)" label.
  async function checkBitrateSupport() {
    const sr  = audioBuffer.sampleRate;
    const nCh = audioBuffer.numberOfChannels;
    for (const opt of bitrateSelect.options) {
      const bitrate = parseInt(opt.value, 10);
      try {
        const { supported } = await AudioEncoder.isConfigSupported(
          { codec: 'mp4a.40.2', sampleRate: sr, numberOfChannels: nCh, bitrate }
        );
        opt.disabled    = !supported;
        opt.textContent = opt.textContent.replace(' (unsupported)', '') +
                          (supported ? '' : ' (unsupported)');
      } catch (_) {
        opt.disabled    = true;
        opt.textContent = opt.textContent.replace(' (unsupported)', '') + ' (unsupported)';
      }
    }
    // If currently selected option got disabled, pick the first supported one
    if (bitrateSelect.selectedOptions[0]?.disabled) {
      const first = Array.from(bitrateSelect.options).find(o => !o.disabled);
      if (first) first.selected = true;
    }
  }

  // ── Fade helper ───────────────────────────────────────────────────────────────
  // Applies a linear fade-in and/or fade-out in-place on a Float32Array slice.
  // fadeInSamples / fadeOutSamples are clamped to half the buffer length so
  // they never overlap even on very short selections.
  function applyFade(data, length, fadeInSamples, fadeOutSamples) {
    const half = Math.floor(length / 2);
    const fi   = Math.min(fadeInSamples,  half);
    const fo   = Math.min(fadeOutSamples, half);
    for (let i = 0; i < fi; i++)          data[i] *= i / fi;
    for (let i = 0; i < fo; i++)          data[length - 1 - i] *= i / fo;
  }

  // Build a faded AudioBuffer from the current selection + fade settings.
  // Returns a new AudioBuffer (does not modify the original).
  function buildFadedBuffer() {
    const sr          = audioBuffer.sampleRate;
    const nCh         = audioBuffer.numberOfChannels;
    const startSample = Math.floor(selStart * sr);
    const endSample   = Math.floor(selEnd   * sr);
    const length      = endSample - startSample;
    const fadeIn      = Math.round((parseFloat(fadeInEl.value)  || 0) * sr);
    const fadeOut     = Math.round((parseFloat(fadeOutEl.value) || 0) * sr);

    const ac  = getAC();
    const out = ac.createBuffer(nCh, length, sr);
    for (let c = 0; c < nCh; c++) {
      const src  = audioBuffer.getChannelData(c).slice(startSample, endSample);
      applyFade(src, length, fadeIn, fadeOut);
      out.copyToChannel(src, c);
    }
    return out;
  }

  // ── Preview ───────────────────────────────────────────────────────────────────
  playBtn.addEventListener('click', () => {
    if (!audioBuffer) return;
    if (previewSrc) {
      try { previewSrc.stop(); } catch (_) {}
      previewSrc = null;
      playBtn.textContent = '▶ Preview';
      return;
    }
    if (selEnd <= selStart) { setStatus('Select a region first'); return; }
    const ac     = getAC();
    const faded  = buildFadedBuffer();
    const src    = ac.createBufferSource();
    src.buffer   = faded;
    src.connect(ac.destination);
    src.start(0);
    previewSrc = src;
    playBtn.textContent = '■ Stop';
    src.onended = () => { playBtn.textContent = '▶ Preview'; previewSrc = null; };
    setStatus('Playing preview…');
  });

  // ── Extract + download ────────────────────────────────────────────────────────
  downloadLink.addEventListener('click', async e => {
    if (downloadLink.classList.contains('disabled')) { e.preventDefault(); return; }
    if (!audioBuffer || selEnd <= selStart) { e.preventDefault(); return; }

    // If we already have a fresh href set, let the browser handle the download
    // naturally (user clicked again without changing anything).
    if (downloadLink.href && downloadLink.href !== window.location.href
        && !downloadLink.dataset.dirty) return;

    e.preventDefault();
    downloadLink.dataset.dirty = '';

    const fmt     = fmtSelect.value;
    const hasFade = (parseFloat(fadeInEl.value) || 0) > 0 ||
                    (parseFloat(fadeOutEl.value) || 0) > 0;

    downloadLink.classList.add('disabled');

    try {
      const baseName = sourceFile ? sourceFile.name.replace(/\.[^.]+$/, '') : 'audio';
      const ts       = selStart.toFixed(2) + '-' + selEnd.toFixed(2);
      let blob, filename;

      const fadeIn  = parseFloat(fadeInEl.value)  || 0;
      const fadeOut = parseFloat(fadeOutEl.value) || 0;

      setStatus(hasFade ? '' : 'Checking for lossless copy…');
      const remuxed = hasFade ? null : await tryRemux(sourceFile, fmt, selStart, selEnd);

      if (remuxed) {
        blob     = remuxed.blob;
        filename = baseName + '_' + ts + '.' + remuxed.ext;
        setStatus((selEnd - selStart).toFixed(2) + 's — lossless copy', 'ok');
      } else {
        setStatus(fmt === 'aac' ? 'Encoding AAC via AudioEncoder…' : 'Encoding WAV…');
        const faded = buildFadedBuffer();
        if (fmt === 'aac') {
          blob     = await extractAAC(faded, 0, faded.duration);
          filename = baseName + '_' + ts + '.aac';
        } else {
          blob     = extractWAV(faded, 0, faded.duration);
          filename = baseName + '_' + ts + '.wav';
        }
        setStatus((selEnd - selStart).toFixed(2) + 's as ' + fmt.toUpperCase(), 'ok');
      }

      const url = URL.createObjectURL(blob);
      downloadLink.href     = url;
      downloadLink.download = filename;
      dlFilename.textContent = filename;
      downloadLink.classList.remove('disabled');

      // Trigger the download automatically
      downloadLink.click();

    } catch (err) {
      setStatus('Error: ' + (err.message || String(err)), 'error');
      downloadLink.classList.remove('disabled');
    }
  });

  // Mark dirty whenever the selection or format changes so next click re-encodes
  function markExtractDirty() { downloadLink.dataset.dirty = '1'; }

  // ══════════════════════════════════════════════════════════════════════════════
  // LOSSLESS REMUXER
  // tryRemux(file, startSec, endSec) → {blob, ext} | null
  //
  // Tries to copy compressed frames directly from the source file without
  // decode→reencode. Returns null if the format is not supported or if parsing
  // fails (caller falls back to the existing encode path).
  //
  // Supported formats:
  //   WAV  — copy PCM samples, rewrite header
  //   ADTS AAC (.aac) — scan sync words, copy frames in time range
  //   M4A / MP4 — parse MP4 boxes, copy AAC frames, write new MP4
  //   FLAC — parse frame headers, copy frames in time range, patch STREAMINFO
  // ══════════════════════════════════════════════════════════════════════════════

  async function tryRemux(file, fmt, startSec, endSec) {
    if (!file) return null;
    try {
      const buf  = await file.arrayBuffer();
      const view = new DataView(buf);
      const u8   = new Uint8Array(buf);
      const srcFmt = detectContainerFormat(view, u8);
      console.log('[remux] file=' + file.name + ' srcFmt=' + srcFmt + ' outFmt=' + fmt
                + ' start=' + startSec.toFixed(3) + ' end=' + endSec.toFixed(3));

      // Only remux when source matches the selected output format
      // wav  → only if source is WAV
      // aac  → only if source is ADTS AAC or M4A/MP4
      // flac → always remux to flac (falls through regardless of fmt)
      let result = null;
      if (fmt === 'wav'  && srcFmt === 'wav')                        result = remuxWAV(view, u8, startSec, endSec);
      else if (fmt === 'aac' && srcFmt === 'adts')                   result = remuxADTS(u8, startSec, endSec);
      else if (fmt === 'aac' && srcFmt === 'mp4')                    result = remuxMP4(view, u8, startSec, endSec);
      else if (srcFmt === 'flac')                                     result = remuxFLAC(view, u8, startSec, endSec);
      else console.log('[remux] source format ' + srcFmt + ' does not match output ' + fmt + ', skipping');

      console.log('[remux] result=' + (result ? 'blob/' + result.ext + ' size=' + result.blob.size : 'null'));
      return result;
    } catch (e) {
      console.warn('[remux] exception:', e);
      return null;
    }
  }

  // ── Format detection (magic bytes) ───────────────────────────────────────────
  function detectContainerFormat(view, u8) {
    const id = (o) => String.fromCharCode(u8[o], u8[o+1], u8[o+2], u8[o+3]);
    if (id(0) === 'RIFF' && id(8) === 'WAVE')  return 'wav';
    if (id(0) === 'fLaC')                       return 'flac';
    // MP4 / M4A / M4V / MOV all use 'ftyp' box at offset 4
    if (id(4) === 'ftyp')                       return 'mp4';
    // WebM / MKV: EBML magic
    if (u8[0] === 0x1A && u8[1] === 0x45 && u8[2] === 0xDF && u8[3] === 0xA3) return 'webm';
    // OGG
    if (id(0) === 'OggS')                       return 'ogg';
    // AVI
    if (id(0) === 'RIFF' && id(8) === 'AVI ')   return 'avi';
    // ADTS AAC
    if (u8[0] === 0xFF && (u8[1] & 0xF0) === 0xF0 &&
        (u8[1] & 0x06) === 0x00)                return 'adts';
    return null;
  }

  // ── WAV remux ─────────────────────────────────────────────────────────────────
  function remuxWAV(view, u8, startSec, endSec) {
    let fmtOff = -1, dataOff = -1, dataLen = 0;
    let pos = 12;
    while (pos < u8.length - 8) {
      const tag = String.fromCharCode(u8[pos],u8[pos+1],u8[pos+2],u8[pos+3]);
      const sz  = view.getUint32(pos + 4, true);
      if (tag === 'fmt ') fmtOff = pos + 8;
      if (tag === 'data') { dataOff = pos + 8; dataLen = sz; }
      if (sz === 0) break;
      pos += 8 + sz + (sz & 1);
    }
    console.log('[remuxWAV] fmtOff=' + fmtOff + ' dataOff=' + dataOff + ' dataLen=' + dataLen);
    if (fmtOff < 0 || dataOff < 0) return null;

    const sr         = view.getUint32(fmtOff + 4,  true);
    const blockAlign = view.getUint16(fmtOff + 12, true);
    console.log('[remuxWAV] sr=' + sr + ' blockAlign=' + blockAlign);
    if (!sr || !blockAlign) return null;

    const maxData    = u8.length - dataOff;
    const actualData = Math.min(dataLen, maxData);
    const startByte  = Math.min(Math.floor(startSec * sr) * blockAlign, actualData);
    const endByte    = Math.min(Math.floor(endSec   * sr) * blockAlign, actualData);
    const newDataLen = endByte - startByte;
    console.log('[remuxWAV] actualData=' + actualData + ' startByte=' + startByte
              + ' endByte=' + endByte + ' newDataLen=' + newDataLen);
    if (newDataLen <= 0) return null;

    const fmtChunkSize = view.getUint32(fmtOff - 4, true);
    const riffPayload  = 4 + 8 + fmtChunkSize + 8 + newDataLen;
    const out  = new Uint8Array(8 + riffPayload);
    const outV = new DataView(out.buffer);
    const ws   = (off, s) => { for (let i=0;i<s.length;i++) out[off+i]=s.charCodeAt(i); };
    ws(0, 'RIFF');
    outV.setUint32(4, riffPayload, true);
    ws(8, 'WAVE');
    ws(12, 'fmt ');
    outV.setUint32(16, fmtChunkSize, true);
    out.set(u8.subarray(fmtOff, fmtOff + fmtChunkSize), 20);
    ws(20 + fmtChunkSize, 'data');
    outV.setUint32(20 + fmtChunkSize + 4, newDataLen, true);
    out.set(u8.subarray(dataOff + startByte, dataOff + endByte), 20 + fmtChunkSize + 8);
    return { blob: new Blob([out.buffer], { type: 'audio/wav' }), ext: 'wav' };
  }

  // ── ADTS AAC remux ────────────────────────────────────────────────────────────
  // Walk ADTS frames, accumulate frame durations (1024 samples each),
  // copy frames whose time range overlaps [startSec, endSec].
  function remuxADTS(u8, startSec, endSec) {
    let sampleRate = 0, pos = 0;
    const FREQ = [96000,88200,64000,48000,44100,32000,24000,22050,16000,12000,11025,8000,7350];
    const out  = [];
    let   tSec = 0;

    while (pos < u8.length - 7) {
      // Find sync
      if (u8[pos] !== 0xFF || (u8[pos+1] & 0xF0) !== 0xF0) { pos++; continue; }
      const noCRC   = u8[pos+1] & 0x01;
      const hdrLen  = noCRC ? 7 : 9;
      const fi      = (u8[pos+2] >> 2) & 0x0F;
      const sr      = FREQ[fi] || 44100;
      if (!sampleRate) sampleRate = sr;
      const fl = ((u8[pos+3] & 0x03) << 11) | (u8[pos+4] << 3) | (u8[pos+5] >> 5);
      if (fl < hdrLen || pos + fl > u8.length) break;

      const frameDur = 1024 / sr;
      const frameEnd = tSec + frameDur;

      if (tSec >= startSec && frameEnd <= endSec + frameDur) {
        out.push(u8.subarray(pos, pos + fl));
      }
      tSec += frameDur;
      pos  += fl;
      if (tSec > endSec + frameDur) break;
    }

    if (!out.length) return null;
    const total = out.reduce((s, a) => s + a.length, 0);
    const merged = new Uint8Array(total);
    let mp = 0;
    for (const f of out) { merged.set(f, mp); mp += f.length; }
    return { blob: new Blob([merged.buffer], { type: 'audio/aac' }), ext: 'aac' };
  }

  // ── MP4 / M4A remux ───────────────────────────────────────────────────────────
  // Parses just enough of the MP4 box structure to find the AAC sample table,
  // then writes a minimal new MP4 with the selected samples.
  function remuxMP4(view, u8, startSec, endSec) {
    // --- Box parser ---
    function readBox(buf, view, offset, end) {
      const boxes = {};
      let p = offset;
      while (p < end - 7) {
        let size = view.getUint32(p);
        const type = String.fromCharCode(buf[p+4],buf[p+5],buf[p+6],buf[p+7]);
        if (size === 1) {
          // 64-bit size (simplified: high 32 bits assumed 0)
          size = view.getUint32(p + 12);
          p += 8;
        }
        if (size < 8) break;
        boxes[type] = { offset: p, size, dataOffset: p + 8 };
        p += size;
      }
      return boxes;
    }

    const top   = readBox(u8, view, 0, u8.length);
    if (!top.moov || !top.mdat) return null;

    const moov  = top.moov;
    const moovB = readBox(u8, view, moov.dataOffset, moov.offset + moov.size);
    if (!moovB.trak) return null;

    // Find audio trak (handler = 'soun')
    let audioTrak = null;
    let p2 = moov.dataOffset;
    while (p2 < moov.offset + moov.size - 7) {
      const sz   = view.getUint32(p2);
      const type = String.fromCharCode(u8[p2+4],u8[p2+5],u8[p2+6],u8[p2+7]);
      if (sz < 8) break;
      if (type === 'trak') {
        const trakB = readBox(u8, view, p2 + 8, p2 + sz);
        if (trakB.mdia) {
          const mdiaB = readBox(u8, view, trakB.mdia.dataOffset,
                                trakB.mdia.offset + trakB.mdia.size);
          if (mdiaB.hdlr) {
            const hdlrType = String.fromCharCode(
              u8[mdiaB.hdlr.dataOffset+8],  u8[mdiaB.hdlr.dataOffset+9],
              u8[mdiaB.hdlr.dataOffset+10], u8[mdiaB.hdlr.dataOffset+11]);
            if (hdlrType === 'soun') { audioTrak = { offset: p2, size: sz, boxes: trakB }; break; }
          }
        }
      }
      p2 += sz;
    }
    if (!audioTrak) return null;

    const mdiaB = readBox(u8, view, audioTrak.boxes.mdia.dataOffset,
                          audioTrak.boxes.mdia.offset + audioTrak.boxes.mdia.size);
    if (!mdiaB.mdhd || !mdiaB.minf) return null;

    // Time scale from mdhd
    const mdhdV   = u8[mdiaB.mdhd.dataOffset];
    const tsOff   = mdhdV === 1 ? 20 : 12; // version 1 = 64-bit times
    const timeScale = view.getUint32(mdiaB.mdhd.dataOffset + tsOff);

    const minfB = readBox(u8, view, mdiaB.minf.dataOffset,
                          mdiaB.minf.offset + mdiaB.minf.size);
    if (!minfB.stbl) return null;

    const stblB = readBox(u8, view, minfB.stbl.dataOffset,
                          minfB.stbl.offset + minfB.stbl.size);
    if (!stblB.stts || !stblB.stsz || !stblB.stco) return null;

    // stts: decode time-to-sample table → cumulative sample start times
    const sttsD   = stblB.stts.dataOffset + 4; // skip version+flags
    const sttsN   = view.getUint32(sttsD);
    const sampleTimes = []; // sampleTimes[i] = start time of sample i (in timeScale units)
    let   cumT = 0;
    for (let i = 0; i < sttsN; i++) {
      const count = view.getUint32(sttsD + 4 + i * 8);
      const delta = view.getUint32(sttsD + 8 + i * 8);
      for (let j = 0; j < count; j++) { sampleTimes.push(cumT); cumT += delta; }
    }
    const totalSamples = sampleTimes.length;

    // stsz: sample sizes
    const stszD      = stblB.stsz.dataOffset + 4;
    const fixedSize  = view.getUint32(stszD);
    const stszCount  = view.getUint32(stszD + 4);
    const sampleSizes = [];
    for (let i = 0; i < stszCount; i++) {
      sampleSizes.push(fixedSize || view.getUint32(stszD + 8 + i * 4));
    }

    // stco: chunk offsets (file-absolute)
    const stcoD    = stblB.stco.dataOffset + 4;
    const stcoN    = view.getUint32(stcoD);
    const chunkOffsets = [];
    for (let i = 0; i < stcoN; i++) chunkOffsets.push(view.getUint32(stcoD + 4 + i * 4));

    // stsc: sample-to-chunk mapping
    const stscD = stblB.stsc.dataOffset + 4;
    const stscN = view.getUint32(stscD);
    const stscEntries = [];
    for (let i = 0; i < stscN; i++) {
      stscEntries.push({
        firstChunk:      view.getUint32(stscD + 4  + i * 12),
        samplesPerChunk: view.getUint32(stscD + 8  + i * 12),
      });
    }

    // Build per-sample file offsets
    const sampleOffsets = new Array(totalSamples);
    let   sampleIdx = 0;
    for (let ci = 0; ci < chunkOffsets.length && sampleIdx < totalSamples; ci++) {
      // Find samplesPerChunk for this chunk
      let spc = stscEntries[0].samplesPerChunk;
      for (let e = 0; e < stscEntries.length; e++) {
        if (ci + 1 >= stscEntries[e].firstChunk) spc = stscEntries[e].samplesPerChunk;
      }
      let byteOff = chunkOffsets[ci];
      for (let s = 0; s < spc && sampleIdx < totalSamples; s++, sampleIdx++) {
        sampleOffsets[sampleIdx] = byteOff;
        byteOff += sampleSizes[sampleIdx];
      }
    }

    // Select samples in [startSec, endSec]
    const startTS = Math.floor(startSec * timeScale);
    const endTS   = Math.floor(endSec   * timeScale);
    let   first = -1, last = -1;
    for (let i = 0; i < totalSamples; i++) {
      if (sampleTimes[i] >= startTS && first < 0) first = i;
      if (sampleTimes[i] <  endTS)                last  = i;
    }
    if (first < 0 || last < first) return null;

    // Collect raw AAC frame bytes
    const frames = [];
    for (let i = first; i <= last; i++) {
      frames.push(u8.subarray(sampleOffsets[i], sampleOffsets[i] + sampleSizes[i]));
    }

    // Get sample rate + channel count from esds/mp4a box for ADTS output
    // (We'll just wrap in ADTS using audioBuffer's decoded properties)
    const sr  = audioBuffer.sampleRate;
    const nCh = audioBuffer.numberOfChannels;
    const adtsOut = buildADTSFromRawFrames(frames, sr, nCh);
    return { blob: new Blob([adtsOut], { type: 'audio/aac' }), ext: 'aac' };
  }

  // Build ADTS stream from raw AAC frame byte arrays (no headers)
  function buildADTSFromRawFrames(frames, sampleRate, nChannels) {
    const FREQ = [96000,88200,64000,48000,44100,32000,24000,22050,16000,12000,11025,8000,7350];
    let fi = FREQ.indexOf(sampleRate); if (fi < 0) fi = 4;
    const total = frames.reduce((s, f) => s + 7 + f.length, 0);
    const out   = new Uint8Array(total);
    let   pos   = 0;
    for (const d of frames) {
      const fl = 7 + d.length;
      out[pos  ] = 0xFF; out[pos+1] = 0xF1;
      out[pos+2] = (1 << 6) | (fi << 2) | (nChannels >> 2);
      out[pos+3] = ((nChannels & 3) << 6) | ((fl >> 11) & 0x03);
      out[pos+4] = (fl >> 3) & 0xFF;
      out[pos+5] = ((fl & 7) << 5) | 0x1F;
      out[pos+6] = 0xFC;
      out.set(d, pos + 7); pos += fl;
    }
    return out.buffer;
  }

  // ── FLAC remux ────────────────────────────────────────────────────────────────
  // FLAC frames are self-delimiting with their own sync + header.
  // We copy frames whose sample position falls in [startSec, endSec],
  // then prepend a patched fLaC marker + STREAMINFO with updated min/max/total.
  function remuxFLAC(view, u8, startSec, endSec) {
    // Read STREAMINFO (always first metadata block)
    // Byte offsets within STREAMINFO data (after 4-byte block header):
    //   0-1: min block size, 2-3: max block size
    //   4-6: min frame size (24b), 7-9: max frame size (24b)
    //   10-13(+bits): sample rate (20b) | channels-1 (3b) | bps-1 (5b) | total samples (36b)
    const siOff = 4 + 4; // fLaC marker (4) + block header (4)
    const sr    = (view.getUint16(siOff + 10) >> 4) & 0xFFFFF; // top 20 bits across bytes 10-12
    if (!sr) return null;

    // Walk metadata blocks to find first audio frame
    let mp = 4; // skip 'fLaC'
    let metaEnd = 4;
    while (mp < u8.length) {
      const last = (u8[mp] & 0x80) !== 0;
      const bsz  = (u8[mp+1] << 16) | (u8[mp+2] << 8) | u8[mp+3];
      mp += 4 + bsz;
      if (last) { metaEnd = mp; break; }
    }

    const startSamp = Math.floor(startSec * sr);
    const endSamp   = Math.floor(endSec   * sr);
    const outFrames = [];
    let   fp        = metaEnd;

    // FLAC frame sync: 0xFF 0xF8 (fixed block) or 0xFF 0xF9 (variable)
    // We rely on the sample/frame number in the header to determine position.
    while (fp < u8.length - 4) {
      if (u8[fp] !== 0xFF || (u8[fp+1] & 0xFE) !== 0xF8) { fp++; continue; }
      const varBlock = (u8[fp+1] & 0x01) === 1;

      // Parse block size
      const bsCode = (u8[fp+2] >> 4) & 0x0F;
      let   blockSize;
      if      (bsCode === 1)  blockSize = 192;
      else if (bsCode >= 2 && bsCode <= 5)  blockSize = 576 * (1 << (bsCode - 2));
      else if (bsCode === 6)  blockSize = u8[fp + 4 /* approx */] + 1;  // 8-bit from end of header
      else if (bsCode === 7)  blockSize = ((u8[fp+4] << 8) | u8[fp+5]) + 1;
      else if (bsCode >= 8)   blockSize = 256 * (1 << (bsCode - 8));
      else blockSize = 0;

      // Sample/frame number (UTF-8 coded integer after byte 4)
      let numOff = fp + 4, val = 0;
      const fb = u8[numOff];
      let   extra = fb < 0x80 ? 0 : fb < 0xC0 ? 0
                  : fb < 0xE0 ? 1 : fb < 0xF0 ? 2
                  : fb < 0xF8 ? 3 : fb < 0xFC ? 4 : 5;
      val = fb & (0x3F >> extra);
      for (let k = 0; k < extra; k++) val = (val << 6) | (u8[++numOff] & 0x3F);
      const frameSamp = varBlock ? val : val * (blockSize || 4096);

      if (frameSamp >= endSamp) break;

      // Find next frame start to know this frame's byte length
      let nextFP = fp + 4;
      while (nextFP < u8.length - 1) {
        if (u8[nextFP] === 0xFF && (u8[nextFP+1] & 0xFE) === 0xF8) break;
        nextFP++;
      }
      if (nextFP >= u8.length - 1) nextFP = u8.length;

      if (frameSamp + (blockSize || 4096) > startSamp) {
        outFrames.push(u8.subarray(fp, nextFP));
      }
      fp = nextFP;
    }

    if (!outFrames.length) return null;

    // Build output: original metadata blocks + selected frames
    const metaBytes  = u8.subarray(0, metaEnd);
    const framesTotal = outFrames.reduce((s, f) => s + f.length, 0);
    const out        = new Uint8Array(metaEnd + framesTotal);
    out.set(metaBytes, 0);
    let op = metaEnd;
    for (const f of outFrames) { out.set(f, op); op += f.length; }

    return { blob: new Blob([out.buffer], { type: 'audio/flac' }), ext: 'flac' };
  }

  // ══════════════════════════════════════════════════════════════════════════════
  // END LOSSLESS REMUXER
  // ══════════════════════════════════════════════════════════════════════════════

  // ── AAC encoder (WebCodecs AudioEncoder, Chromium 94+) ───────────────────────
  async function extractAAC(buffer, startSec, endSec) {
    if (typeof AudioEncoder === 'undefined') {
      throw new Error('AudioEncoder API not available in this browser. Please switch to WAV.');
    }

    const sr          = buffer.sampleRate;
    const nCh         = buffer.numberOfChannels;
    const startSample = Math.floor(startSec * sr);
    const endSample   = Math.floor(endSec   * sr);
    const length      = endSample - startSample;

    if (length <= 0) throw new Error('Selection is empty.');

    const bitrate = parseInt(bitrateSelect.value, 10);
    const config  = { codec: 'mp4a.40.2', sampleRate: sr, numberOfChannels: nCh, bitrate };

    const support = await AudioEncoder.isConfigSupported(config);
    if (!support.supported) {
      throw new Error('AAC (mp4a.40.2) not supported in this browser. Please switch to WAV.');
    }

    // Safe channel slicing: .slice() copies the data so we own it cleanly.
    // Avoid Float32Array(ch.buffer, byteOffset, length) — ch.byteOffset may
    // be non-zero, making the byte arithmetic wrong and feeding garbage to the encoder.
    const channelData = [];
    for (let c = 0; c < nCh; c++) {
      channelData.push(buffer.getChannelData(c).slice(startSample, endSample));
    }

    const chunks = [];

    await new Promise((resolve, reject) => {
      let encoder = null;

      try {
        encoder = new AudioEncoder({
          output: chunk => chunks.push(chunk),
          error:  err  => {
            try { encoder.close(); } catch (_) {}
            reject(new Error('AudioEncoder error: ' + err.message));
          },
        });

        encoder.configure(config);

        // AAC-LC uses 1024-sample frames. Always allocate a full FRAME-sized
        // buffer; the last (possibly shorter) frame gets zero-padded automatically
        // because Float32Array is zero-initialised.
        const FRAME = 1024;
        let   ts    = 0; // timestamp in samples; converted to µs below

        for (let offset = 0; offset < length; offset += FRAME) {
          const frameLen    = Math.min(FRAME, length - offset);
          const interleaved = new Float32Array(FRAME * nCh); // zero-padded

          for (let i = 0; i < frameLen; i++) {
            for (let c = 0; c < nCh; c++) {
              interleaved[i * nCh + c] = channelData[c][offset + i];
            }
          }

          const ad = new AudioData({
            format:           'f32',        // interleaved float32 — correct WebCodecs enum value
            sampleRate:       sr,
            numberOfFrames:   FRAME,        // always 1024; last frame is zero-padded
            numberOfChannels: nCh,
            timestamp:        Math.round(ts * 1_000_000 / sr),
            data:             interleaved,
          });

          encoder.encode(ad);
          ad.close();
          ts += frameLen; // advance by real samples, not padded size
        }

        encoder.flush()
          .then(() => { encoder.close(); resolve(); })
          .catch(err => { try { encoder.close(); } catch (_) {} reject(err); });

      } catch (err) {
        if (encoder) try { encoder.close(); } catch (_) {}
        reject(err);
      }
    });

    if (chunks.length === 0) throw new Error('Encoder produced no output. Try WAV instead.');

    return new Blob([buildADTS(chunks, sr, nCh)], { type: 'audio/aac' });
  }

  // Wrap raw AAC frames in ADTS headers so the file is self-contained
  function buildADTS(chunks, sampleRate, nChannels) {
    const FREQ_TABLE = [96000, 88200, 64000, 48000, 44100, 32000,
                        24000, 22050, 16000, 12000, 11025,  8000, 7350];
    let fi = FREQ_TABLE.indexOf(sampleRate);
    if (fi < 0) fi = 4; // default to 44100 index if not found

    const raw   = chunks.map(chunk => {
      const d = new Uint8Array(chunk.byteLength);
      chunk.copyTo(d);
      return d;
    });
    const total = raw.reduce((sum, d) => sum + 7 + d.length, 0);
    const out   = new Uint8Array(total);
    let   pos   = 0;

    for (const d of raw) {
      const fl = 7 + d.length; // total frame length incl. header
      // ADTS fixed header
      out[pos    ] = 0xFF;
      out[pos + 1] = 0xF1;                               // MPEG-4, no CRC
      out[pos + 2] = (1 << 6) | (fi << 2) | (nChannels >> 2); // AAC-LC, freq, ch[2]
      out[pos + 3] = ((nChannels & 3) << 6) | ((fl >> 11) & 0x03);
      out[pos + 4] = (fl >> 3) & 0xFF;
      out[pos + 5] = ((fl & 7) << 5) | 0x1F;            // VBR fullness
      out[pos + 6] = 0xFC;
      out.set(d, pos + 7);
      pos += fl;
    }
    return out.buffer;
  }

  // ── WAV encoder (pure JS) ─────────────────────────────────────────────────────
  function extractWAV(buffer, startSec, endSec) {
    const sr          = buffer.sampleRate;
    const nCh         = buffer.numberOfChannels;
    const startSample = Math.floor(startSec * sr);
    const endSample   = Math.floor(endSec   * sr);
    const length      = endSample - startSample;

    if (length <= 0) throw new Error('Selection is empty.');

    const dataLen = length * nCh * 2; // 16-bit samples
    const ab      = new ArrayBuffer(44 + dataLen);
    const v       = new DataView(ab);

    const ws = (off, str) => {
      for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i));
    };

    ws(0, 'RIFF'); v.setUint32(4,  36 + dataLen,     true);
    ws(8, 'WAVE');
    ws(12, 'fmt '); v.setUint32(16, 16,              true);
    v.setUint16(20, 1,             true); // PCM
    v.setUint16(22, nCh,           true);
    v.setUint32(24, sr,            true);
    v.setUint32(28, sr * nCh * 2,  true); // byte rate
    v.setUint16(32, nCh * 2,       true); // block align
    v.setUint16(34, 16,            true); // bits per sample
    ws(36, 'data'); v.setUint32(40, dataLen,          true);

    let off = 44;
    for (let i = 0; i < length; i++) {
      for (let c = 0; c < nCh; c++) {
        const s = Math.max(-1, Math.min(1, buffer.getChannelData(c)[startSample + i]));
        v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        off += 2;
      }
    }

    return new Blob([ab], { type: 'audio/wav' });
  }

})();
</script>
